name = "dq-tracker-push"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Cần bật cờ này vì thư viện gửi push (@block65/webcrypto-web-push) có dùng
# module "node:crypto" - nếu không bật, Worker có thể lỗi lúc chạy thật.
compatibility_flags = ["nodejs_compat"]

# Cron Trigger: chạy mỗi phút để kiểm tra giá và bắn push.
[triggers]
crons = ["*/1 * * * *"]

# KV namespace lưu cảnh báo giá + push subscription (id lấy từ bước
# `wrangler kv namespace create TRACKER_KV`).
kv_namespaces = [
  { binding = "TRACKER_KV", id = "715bce1c8d2043b58bb479a73772c39b" }
]

[vars]
VAPID_SUBJECT = "mailto:quocngyendanght@gmail.com"
